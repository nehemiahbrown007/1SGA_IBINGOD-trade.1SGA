<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1saa | Secure Access Portal</title>
    <style>
        :root {
            --white: #FFFFFF;
            --black: #000000;
            --gold: #D4AF37;
            --glass: rgba(255, 255, 255, 0.8);
            --gov-gray: #F4F4F4;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; background: var(--gov-gray);
            /* Background image of a blurred luxury office or vault could go here */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .login-vault {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 60px; border-radius: 2px; border: 1px solid #DDD;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 100%; max-width: 400px;
            text-align: center; position: relative;
        }

        .login-vault::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--gold);
        }

        .logo { font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 700; margin-bottom: 10px; }
        .tagline { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; color: #888; margin-bottom: 40px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.7rem; text-transform: uppercase; font-weight: 600; display: block; margin-bottom: 8px; }
        input {
            width: 100%; padding: 12px; border: 1px solid #CCC; background: transparent;
            box-sizing: border-box; font-family: 'Inter'; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); }
